interface:
  display_name: "Zotero Translate"
  short_description: "Translate Zotero PDFs with API-first or agent-batch routing"
  default_prompt: "Use $zotero-translate to translate the selected Zotero PDF after confirming the target language. Do not run a smoke/page-only trial unless requested. Run scripts/check_api.py first; if apiAvailable is true, use direct OpenAI-compatible API translation, otherwise use the agent-batch route with cheap low-latency subagents that translate from assigned JSONL/context/glossary without external translation tools. Never use public MT backends such as pdf2zh --google/--bing. Validate, render mono and dual PDFs, and attach outputs back to Zotero."
